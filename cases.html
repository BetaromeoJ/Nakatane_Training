<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活用事例 | 中種子町情報教育部会研修会</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="assets/tailwind.css">
<link rel="stylesheet" href="assets/common.css">
</head>
<body class="text-ink antialiased">

  <div id="splash" class="splash-overlay">
    <div class="splash-text">活用事例<span class="splash-sub">CASES</span></div>
  </div>

  <div id="copy-announcer" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);"></div>

  <div data-include="assets/partials/nav.html"></div>

  <main class="max-w-4xl mx-auto px-6">
    <header class="pt-40 pb-10">
      <p class="badge inline-block text-xs font-bold text-blue-600 bg-white border border-gray-200 px-5 py-2 rounded-full mb-6 uppercase">Cases</p>
      <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">活用事例</h1>
      <p class="text-gray-600 text-lg leading-relaxed">学校現場での実際の活用事例を、カードで紹介していきます。</p>
    </header>

    <!-- ============================================================
         事例カード追加ガイド
         下記のような .card-hover を1枚追加するだけで、新しい活用事例を
         増やせます。

         <div class="card-hover bg-white border border-gray-100 rounded-2xl p-6">
           <span class="badge inline-block text-xs font-bold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full mb-4 uppercase">学校名 or 学年</span>
           <h3 class="text-xl font-bold mb-2">事例タイトル</h3>
           <p class="text-gray-600 text-sm leading-relaxed">事例の説明文をここに書きます。</p>
         </div>
         ============================================================ -->
    <section id="cases-list" class="pb-16">
      <div class="card-hover bg-white border border-gray-100 rounded-2xl p-8 text-center">
        <div class="avatar text-3xl mx-auto mb-4">🌱</div>
        <p class="text-gray-500 font-bold">活用事例は近日公開予定です。</p>
        <p class="text-gray-400 text-sm mt-2">研修後、学校現場での実践が集まり次第、順次紹介していきます。</p>
      </div>
    </section>

    <div class="flex flex-wrap justify-between items-center gap-4 border-t border-gray-100 pt-8 pb-20 text-sm">
      <a href="index.html" class="text-gray-500 hover:text-ink">&larr; トップページへ戻る</a>
    </div>
  </main>

  <div data-include="assets/partials/footer.html"></div>

  <script src="assets/common.js"></script>
</body>
</html>
