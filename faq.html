<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ | 中種子町情報教育部会研修会</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="assets/tailwind.css">
<link rel="stylesheet" href="assets/common.css">
</head>
<body class="text-ink antialiased">

  <div id="splash" class="splash-overlay">
    <div class="splash-text">FAQ<span class="splash-sub">よくある質問</span></div>
  </div>

  <div id="copy-announcer" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);"></div>

  <div data-include="assets/partials/nav.html"></div>

  <main class="max-w-3xl mx-auto px-6">
    <header class="pt-40 pb-10">
      <p class="badge inline-block text-xs font-bold text-blue-600 bg-white border border-gray-200 px-5 py-2 rounded-full mb-6 uppercase">FAQ</p>
      <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">よくある質問</h1>
      <p class="text-gray-600 text-lg leading-relaxed">研修で寄せられた質問を、順次こちらに追加していきます。</p>
    </header>

    <!-- ============================================================
         Q&Aカード追加ガイド
         下記のような .prompt-card を1枚追加するだけで、新しいFAQを
         増やせます(コピーボタンは不要なので data-copy-target は付けません)。

         <div class="prompt-card">
           <h4 class="mb-2">Q. 質問文をここに書きます</h4>
           <p class="text-gray-600 text-sm leading-relaxed">A. 回答文をここに書きます。</p>
         </div>
         ============================================================ -->
    <section id="faq-list" class="pb-16">
      <div class="card-hover bg-white border border-gray-100 rounded-2xl p-8 text-center">
        <div class="avatar text-3xl mx-auto mb-4">📮</div>
        <p class="text-gray-500 font-bold">FAQは近日公開予定です。</p>
        <p class="text-gray-400 text-sm mt-2">研修中によく聞かれた質問を、順次まとめていきます。</p>
      </div>
    </section>

    <div class="flex flex-wrap justify-between items-center gap-4 border-t border-gray-100 pt-8 pb-20 text-sm">
      <a href="index.html" class="text-gray-500 hover:text-ink">&larr; トップへ戻る</a>
    </div>
  </main>

  <div data-include="assets/partials/footer.html"></div>

  <script src="assets/common.js"></script>
</body>
</html>
